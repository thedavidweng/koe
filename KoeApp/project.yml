name: Koe
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Release

packages:
  KoeMLX:
    path: ../Packages/KoeMLX

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: nz.owo.koe
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    APP_UPDATE_FEED_URL: "https://raw.githubusercontent.com/missuo/koe/main/docs/update-feed.json"

targetTemplates:
  KoeApp:
    type: application
    platform: macOS
    sources:
      - path: Koe
        excludes:
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: Koe/Info.plist
        CODE_SIGN_ENTITLEMENTS: Koe/Koe.entitlements
        PRODUCT_NAME: Koe
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../koe-core/target"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../target/release"
        OTHER_LDFLAGS:
          - "-lkoe_core"
          - "-lc++"
          - "-lSystem"
          - "-lresolv"
          - "-framework Security"
          - "-framework CoreFoundation"
          - "-framework UserNotifications"
          - "-framework SystemConfiguration"
        ENABLE_APP_SANDBOX: NO
        CLANG_ENABLE_OBJC_ARC: YES
    frameworks:
      - AVFoundation
      - AppKit
      - ApplicationServices
      - Carbon
      - CoreAudio
      - AudioToolbox
      - ServiceManagement
      - UserNotifications
      - sdk: libsqlite3.tbd

targets:
  Koe:
    templates:
      - KoeApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: KoeMLX
        product: KoeMLX
    preBuildScripts:
      - name: Build Rust Library
        script: |
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "${SRCROOT}/.."
          RUST_TARGET="aarch64-apple-darwin"
          cargo build --manifest-path koe-core/Cargo.toml --release --target "$RUST_TARGET"
          mkdir -p "${SRCROOT}/../target/release"
          ln -sf "${SRCROOT}/../target/${RUST_TARGET}/release/libkoe_core.a" "${SRCROOT}/../target/release/libkoe_core.a"
        basedOnDependencyAnalysis: false

  Koe-x86:
    templates:
      - KoeApp
    dependencies: []
    preBuildScripts:
      - name: Build Rust Library
        script: |
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "${SRCROOT}/.."
          RUST_TARGET="x86_64-apple-darwin"
          cargo build --manifest-path koe-core/Cargo.toml --release --target "$RUST_TARGET" --no-default-features --features sherpa-onnx
          mkdir -p "${SRCROOT}/../target/release"
          ln -sf "${SRCROOT}/../target/${RUST_TARGET}/release/libkoe_core.a" "${SRCROOT}/../target/release/libkoe_core.a"
        basedOnDependencyAnalysis: false
